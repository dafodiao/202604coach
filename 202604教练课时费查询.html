    --warning-light: #FEF3C7;
    --danger: #DC2626;
    --danger-light: #FEE2E2;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;

  * { margin:0; padding:0; box-sizing:border-box; }
  body {

  .header {

  }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 13px; opacity: 0.85; }
  .search-wrap {
    max-width: 480px;
    margin: -24px auto 0;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }
  .search-box {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 8px;
    display: flex;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 10px 16px;
    color: var(--gray-900);
    background: transparent;
  }
  .search-box input::placeholder { color: var(--gray-300); }
  .search-box button {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .search-box button:hover { background: #4338CA; }
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 20px;
    right: 20px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    max-height: 240px;
    overflow-y: auto;
    z-index: 100;
    display: none;
  }
  .suggestions.show { display: block; }
  .suggestion-item {
    padding: 12px 16px;
    cursor: pointer;
    font-size: 15px;
    border-bottom: 1px solid var(--gray-100);
    transition: background .15s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--primary-light); }
  .no-result {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-500);
    display: none;
  }
  .no-result .icon { font-size: 48px; margin-bottom: 12px; }
  .no-result p { font-size: 15px; }
  .result-wrap {
    max-width: 720px;
    margin: 24px auto;
    padding: 0 20px 40px;
    display: none;
  }
  .result-wrap.show { display: block; }
  .total-banner {
    background: linear-gradient(135deg, #059669, #10B981);
    color: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(5,150,105,0.3);
  }
  .total-banner .label { font-size: 13px; opacity: 0.9; margin-bottom: 4px; }
  .total-banner .amount { font-size: 36px; font-weight: 800; }
  .total-banner .unit { font-size: 16px; font-weight: 400; margin-left: 2px; }
  .section-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-700);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .dot {
    width: 4px;
    height: 18px;
    background: var(--primary);
    border-radius: 2px;
  }
  .info-row {
    display: flex;
    align-items: flex-start;
    padding: 14px 20px;
    border-bottom: 1px solid var(--gray-50);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    flex-shrink: 0;
    width: 120px;
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.5;
  }
  .info-value {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-900);
    line-height: 1.5;
    text-align: right;
    word-break: break-all;

    color: var(--primary);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .detail-btn:hover { background: #C7D2FE; transform: translateY(-1px); }
  .detail-btn svg { width: 14px; height: 14px; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 12px;
    overflow-y: auto;

  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 920px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn .25s ease;
    margin-bottom: 40px;
  }
  @keyframes modalIn {
    from { opacity:0; transform: translateY(-20px); }
    to { opacity:1; transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--gray-100);
    position: sticky;
    top: 0;
    background: #fff;
    border-radius: 16px 16px 0 0;
    z-index: 1;
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-close {

    border: none;
    background: var(--gray-100);
    font-size: 18px;

    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-500);
    transition: background .2s;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--gray-200); }
  .modal-body { padding: 20px 24px; }

  }
  .privacy-note {

    font-size: 11px;
    color: var(--gray-300);
    padding: 0 20px 20px;

function getHuamings(name) {
  const r = [];
  for (const [h, n] of Object.entries(huamingMap)) { if (n === name) r.push(h); }
  return r;
}
function getDetailRows(huamings) {
  const rows = [];
  for (const h of huamings) { if (detailsData[h]) rows.push(...detailsData[h]); }
  return rows;
}
function fmtMoney(v, showSign) {
  if (v === null || v === undefined) return null;
  const n = Number(v);
  if (isNaN(n)) return null;
  let s = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (showSign && n < 0 ? '-' : '') + s;
}

const input = document.getElementById('searchInput');
const sugBox = document.getElementById('suggestions');

input.addEventListener('input', function() {
  const v = this.value.trim();
  if (!v) { sugBox.classList.remove('show'); return; }
  const allNames = coachesData.map(c => c['真名']).filter(Boolean);
  const unique = [...new Set(allNames)];
  const matches = unique.filter(n => n.includes(v));
  if (!matches.length) { sugBox.classList.remove('show'); return; }
  sugBox.innerHTML = matches.slice(0, 10).map(n => {
    const idx = n.indexOf(v);
    const hl = idx >= 0 ? n.substring(0,idx)+'<b style="color:var(--primary)">'+v+'</b>'+n.substring(idx+v.length) : n;
    return '<div class="suggestion-item" onclick="selectName(\''+n.replace(/'/g,"\\'")+'\')">'+hl+'</div>';
  }).join('');
  sugBox.classList.add('show');
});
input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { doSearch(); sugBox.classList.remove('show'); } });
document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrap')) sugBox.classList.remove('show'); });

function selectName(name) {
  input.value = name;
  sugBox.classList.remove('show');
  doSearch();
}

let pendingCoach = null;

function doSearch() {
  const name = input.value.trim();
  if (!name) return;
  document.getElementById('noResult').style.display = 'none';
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('authWrap').style.display = 'none';
  const allNames = coachesData.map(c => c['真名']).filter(Boolean);
  const unique = [...new Set(allNames)];
  const matchNames = unique.filter(n => n.includes(name));
  if (!matchNames.length) { document.getElementById('noResult').style.display = 'block'; return; }
  const exact = matchNames.find(n => n === name) || matchNames[0];
  const coach = coachesData.find(c => c['真名'] === exact);
  if (!coach) { document.getElementById('noResult').style.display = 'block'; return; }

  // Check if this coach has a phone in phoneMap
  const expectedPhone = phoneMap[exact];
  if (expectedPhone) {
    pendingCoach = coach;
    document.getElementById('authName').textContent = '欢迎，' + exact;
    document.getElementById('phoneInput').value = '';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authWrap').style.display = 'block';
    document.getElementById('phoneInput').focus();
  } else {
    // No phone record, show directly
    renderResult(coach);
  }
}

const phoneInput = document.getElementById('phoneInput');
phoneInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') verifyPhone(); });

function verifyPhone() {
  const phone = phoneInput.value.trim();
  if (!phone || !pendingCoach) return;
  const expectedPhone = phoneMap[pendingCoach['真名']];
  if (phone === String(expectedPhone)) {
    document.getElementById('authWrap').style.display = 'none';
    renderResult(pendingCoach);
    pendingCoach = null;
  } else {
    document.getElementById('authError').textContent = '手机号不正确，请重新输入';
    document.getElementById('authError').style.display = 'block';
    phoneInput.value = '';
    phoneInput.focus();
  }
}

function infoRow(label, value, cls) {
  if (value === null || value === undefined || value === '') return '';
  return '<div class="info-row"><div class="info-label">'+label+'</div><div class="info-value '+(cls||'')+'">'+value+'</div></div>';
}

function renderResult(coach) {
  const wrap = document.getElementById('resultWrap');
  const huamings = getHuamings(coach['真名']);
  const detailRows = getDetailRows(huamings);
  const hasDetail = detailRows.length > 0;
  let h = '';

  // Total
  h += '<div class="total-banner"><div class="label">4月课时费总额</div><div class="amount">¥'+fmtMoney(coach['总额'])+'<span class="unit">元</span></div></div>';

  // 个人信息
  h += '<div class="section-card"><div class="section-title"><span class="dot"></span>个人信息</div>';
  h += infoRow('真名', coach['真名']);
  h += infoRow('收款账户', coach['收款账号']);
  h += infoRow('教练级别', coach['教练级别']);
  h += '</div>';

  // 销售额提成
  const salesFields = [
    ['4月私教销售额', coach['私教销售额'], '元', 'amount'],
    ['销售提点', coach['销售提点'] !== null ? (coach['销售提点']*100).toFixed(0)+'%' : null, '', ''],
    ['销售提成', coach['销售提成'], '元', 'amount'],
    ['退款金额', coach['退款金额'], '元', ''],
    ['退款扣款', coach['退款扣款'], '元', coach['退款扣款'] && Number(coach['退款扣款']) < 0 ? 'danger' : ''],
  ];
  const hasSales = salesFields.some(f => f[1] !== null);
  if (hasSales) {
    h += '<div class="section-card"><div class="section-title"><span class="dot"></span>销售额提成</div>';
    for (const [label, val, unit, cls] of salesFields) {
      if (val === null) continue;
      const display = label.includes('提点') ? val : fmtMoney(val) + unit;
      h += infoRow(label, display, cls);
    }
    h += '</div>';
  }

  // 单次课课时费
  const singleFields = [
    ['单次课上课数', coach['单次课上课数'], '节'],
    ['单次课消耗金额', coach['单次课消耗金额'], '元'],
    ['单次课结算比例', coach['单次课结算比例'] !== null ? (coach['单次课结算比例']*100).toFixed(0)+'%' : null, ''],
    ['单次课课时费', coach['单次课课时费'], '元'],
  ];
  const hasSingle = singleFields.some(f => f[1] !== null);
  if (hasSingle) {
    h += '<div class="section-card"><div class="section-title"><span class="dot"></span>单次课课时费</div>';
    for (const [label, val, unit] of singleFields) {
      if (val === null) continue;
      const display = label.includes('比例') ? val : fmtMoney(val) + unit;
      const cls = label === '单次课课时费' ? 'amount' : '';
      h += infoRow(label, display, cls);
    }
    h += '</div>';
  }

  // 时长课课时费
  h += '<div class="section-card"><div class="section-title"><span class="dot"></span>时长课课时费</div>';
  h += infoRow('时长课课时费', fmtMoney(coach['时长课课时费'])+'元', 'amount');
  if (hasDetail) {
    h += '<div style="padding:12px 20px;"><button class="detail-btn" onclick="showDetail(\''+coach['真名'].replace(/'/g,"\\'")+'\')">';
    h += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z"/></svg>';
    h += ' 查看时长课消耗明细（'+detailRows.length+'条）</button></div>';
  }
  h += '</div>';

  // 其他费用
  const otherItems = [
    ['违规扣款', coach['违规扣款'], coach['违规扣款'] && Number(coach['违规扣款']) !== 0 ? fmtMoney(coach['违规扣款'], true)+'元' : null, Number(coach['违规扣款']||0) < 0 ? 'danger' : 'danger'],
    ['其他补贴', coach['其他补贴'], coach['其他补贴'] && Number(coach['其他补贴']) !== 0 ? fmtMoney(coach['其他补贴'])+'元' : null, 'success'],
    ['培训补贴', coach['培训补贴'], coach['培训补贴'] && Number(coach['培训补贴']) !== 0 ? fmtMoney(coach['培训补贴'])+'元' : null, 'success'],
  ];
  const oldFields = [
    ['OLD去除退款金额', coach['OLD去除退款金额'], '元'],
    ['OLD包月课时费', coach['OLD包月课时费'], '元'],
    ['OLD时长课上课数', coach['OLD时长课上课数'], '节'],
    ['OLD时长课课时费', coach['OLD时长课课时费'], '元'],
    ['OLD常规单次课上课数', coach['OLD常规单次课上课数'], '节'],
    ['OLD单次课课时费', coach['OLD单次课课时费'], '元'],
  ];
  const hasOld = oldFields.some(([,v]) => v !== null && Number(v) !== 0);
  const hasOther = otherItems.some(([, , v]) => v !== null);

  if (hasOther || hasOld) {
    h += '<div class="section-card"><div class="section-title"><span class="dot"></span>其他费用</div>';
    for (const [label, , display, cls] of otherItems) {
      if (display === null) continue;
      h += infoRow(label, display, cls);
    }
    if (hasOld) {
      h += '<div class="old-divider">OLD系列数据</div>';
      for (const [label, val, unit] of oldFields) {
        if (val === null || Number(val) === 0) continue;
        h += infoRow(label, fmtMoney(val)+unit);
      }
    }
    h += '</div>';
  }

  wrap.innerHTML = h;
  wrap.classList.add('show');
  document.getElementById('noResult').style.display = 'none';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showDetail(name) {
  const huamings = getHuamings(name);
  const rows = getDetailRows(huamings);
  let totalConsume = 0, totalFee = 0, totalCheckin = 0, totalCoachCheckin = 0;
  for (const r of rows) {
    totalConsume += Number(r['本月消耗金额']) || 0;
    totalFee += Number(r['课时费总额']) || 0;
    totalCheckin += Number(r['总签到数']) || 0;
    totalCoachCheckin += Number(r['教练签到数']) || 0;
  }

  let h = '<div class="summary-stats">';
  h += '<div class="stat-box"><div class="label">消耗明细条数</div><div class="value">'+rows.length+'</div></div>';
  h += '<div class="stat-box"><div class="label">上课总签到数</div><div class="value">'+totalCheckin+'</div></div>';
  h += '<div class="stat-box"><div class="label">本教练签到数</div><div class="value accent">'+totalCoachCheckin+'</div></div>';
  h += '<div class="stat-box"><div class="label">课时费总额</div><div class="value accent">¥'+totalFee.toFixed(2)+'</div></div>';
  h += '</div>';

  h += '<div class="detail-table-wrap"><table class="detail-table"><thead><tr>';
  h += '<th>学员姓名</th><th>学员手机号</th><th>课程名称</th><th>总课时</th><th>总签到数</th><th>教练签到数</th><th class="num">本月消耗</th><th class="num">课时费</th><th>结算比例</th><th>门店</th>';
  h += '</tr></thead><tbody>';
  for (const r of rows) {
    const consume = (Number(r['本月消耗金额'])||0).toFixed(2);
    const fee = (Number(r['课时费总额'])||0).toFixed(2);
    const ratio = r['结算比例'] ? (Number(r['结算比例'])*100).toFixed(0)+'%' : '-';
    h += '<tr>';
    h += '<td>'+(r['学员姓名']||'-')+'</td>';
    h += '<td>'+(r['学员手机号']||'-')+'</td>';
    h += '<td>'+(r['课程名称']||'-')+'</td>';
    h += '<td>'+(r['总课时']||'-')+'</td>';
    h += '<td>'+(r['总签到数']||'-')+'</td>';
    h += '<td>'+(r['教练签到数']||'-')+'</td>';
    h += '<td class="num">'+consume+'</td>';
    h += '<td class="num">'+fee+'</td>';
    h += '<td>'+ratio+'</td>';
    h += '<td>'+(r['门店名']||'-')+'</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';

  document.getElementById('modalTitle').textContent = name + ' - 时长课消耗明细';
  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
